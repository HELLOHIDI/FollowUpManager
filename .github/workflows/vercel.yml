name: Vercel

on:
  push:
    branches:
      - "**"

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      FALLBACK_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
      FALLBACK_NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      FALLBACK_SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
      FALLBACK_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure branch includes latest main
        if: github.ref != 'refs/heads/main'
        run: |
          git fetch origin main
          git merge-base --is-ancestor origin/main HEAD || {
            echo "::error::This branch must include the latest origin/main before Preview deployment"
            exit 1
          }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: UI baseline
        run: npm run check:ui-baseline

      - name: Unit tests
        run: npm run test

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy preview
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          set -a
          source .vercel/.env.preview.local
          set +a
          required_env=(NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY)
          for key in "${required_env[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key is required for Vercel preview deployment"
              exit 1
            fi
          done
          case "$NEXT_PUBLIC_SUPABASE_URL" in
            http://localhost:*|http://127.0.0.1:*)
              echo "::error::NEXT_PUBLIC_SUPABASE_URL must not point to a local Supabase instance"
              exit 1
              ;;
          esac
          case "$SUPABASE_URL" in
            http://localhost:*|http://127.0.0.1:*)
              echo "::error::SUPABASE_URL must not point to a local Supabase instance"
              exit 1
              ;;
          esac
          if [ "$NEXT_PUBLIC_SUPABASE_ANON_KEY" = "test-anon-key" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY must not use the local test key"
            exit 1
          fi
          if [ "$SUPABASE_SERVICE_ROLE_KEY" = "test-service-role-key" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY must not use the local test key"
            exit 1
          fi
          vercel deploy --yes --logs \
            --build-env NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --build-env NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --build-env SUPABASE_URL="$SUPABASE_URL" \
            --build-env SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --env NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --env NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --env SUPABASE_URL="$SUPABASE_URL" \
            --env SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --token=${{ env.VERCEL_TOKEN }}

      - name: Pull Vercel production environment
        if: github.ref == 'refs/heads/main' && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy production
        if: github.ref == 'refs/heads/main' && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          required_env=(NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY)
          for key in "${required_env[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key is required for Vercel production deployment"
              exit 1
            fi
          done
          case "$NEXT_PUBLIC_SUPABASE_URL" in
            http://localhost:*|http://127.0.0.1:*)
              echo "::error::NEXT_PUBLIC_SUPABASE_URL must not point to a local Supabase instance"
              exit 1
              ;;
          esac
          case "$SUPABASE_URL" in
            http://localhost:*|http://127.0.0.1:*)
              echo "::error::SUPABASE_URL must not point to a local Supabase instance"
              exit 1
              ;;
          esac
          if [ "$NEXT_PUBLIC_SUPABASE_ANON_KEY" = "test-anon-key" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY must not use the local test key"
            exit 1
          fi
          if [ "$SUPABASE_SERVICE_ROLE_KEY" = "test-service-role-key" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY must not use the local test key"
            exit 1
          fi
          vercel deploy --yes --prod --logs \
            --build-env NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --build-env NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --build-env SUPABASE_URL="$SUPABASE_URL" \
            --build-env SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --env NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --env NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --env SUPABASE_URL="$SUPABASE_URL" \
            --env SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --token=${{ env.VERCEL_TOKEN }}
